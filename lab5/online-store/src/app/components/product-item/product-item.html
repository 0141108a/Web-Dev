<div class="product-card">
  <div class="product-image">
    <img [src]="product.image" 
         [alt]="product.name"
         (error)="handleImageError($event)">
  </div>

  <div class="product-info">
    <h3 class="product-title">{{ product.name }}</h3>
    <p class="product-description">{{ product.description }}</p>
    
    <div class="product-rating">
      <span 
        *ngFor="let star of getStars()" 
        class="star"
        [class.full]="getStarType(star) === 'full'"
        [class.half]="getStarType(star) === 'half'"
        [class.empty]="getStarType(star) === 'empty'">
        ★
      </span>
      <span class="rating-value">{{ product.rating }}</span>
    </div>

    <div class="product-price">
      {{ product.price | number }} ₸
    </div>

    <div class="product-actions">
      <div class="action-row">
        <button class="btn-like" (click)="onLike()" [class.liked]="product.likes > 0">
          <span class="heart">❤️</span>
          <span class="likes-count">{{ product.likes }}</span>
        </button>

        <a [href]="product.link" target="_blank" class="btn-buy">
          Купить
        </a>
      </div>
      
      <div class="action-row">
        <button class="btn-share" (click)="shareOnWhatsApp()">
          <span class="icon">📱</span> WhatsApp
        </button>
        <button class="btn-share" (click)="shareOnTelegram()">
          <span class="icon">✈️</span> Telegram
        </button>
        <button class="btn-delete" (click)="onDelete()">
          <span class="icon">🗑️</span>
        </button>
      </div>
    </div>
  </div>
</div>
