<div class="photos-container">
  <button class="back-btn" (click)="goBack()">
    ← Назад к альбому
  </button>
  
  <div class="photos-header">
    <h1>📸 Фотографии альбома #{{ albumId }}</h1>
    <div class="photo-count" *ngIf="!loading && !error">
      Найдено {{ photos.length }} фотографий
    </div>
  </div>
  
  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <p>Загрузка фотографий...</p>
  </div>
  
  <div *ngIf="error" class="error-message">
    ⚠️ {{ error }}
  </div>
  
  <div *ngIf="!loading && !error" class="photos-grid">
    <div *ngIf="photos.length === 0" class="no-photos">
      <div class="no-photos-icon">🖼️</div>
      <h3>В этом альбоме нет фотографий</h3>
    </div>
    
    <div *ngFor="let photo of photos" class="photo-card">
      <div class="photo-container">
        <img [src]="photo.thumbnailUrl" [alt]="photo.title" class="photo-image" loading="lazy">
        <div class="photo-overlay">
          <p class="photo-title">{{ photo.title }}</p>
          <a [href]="photo.url" target="_blank" class="view-full">Открыть оригинал</a>
        </div>
      </div>
    </div>
  </div>
</div>
